<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Over & Out — Web Walkie-Talkie</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@700;900&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

  <!-- ── Landing Screen ──────────────────────────────────────────────────── -->
  <div id="landing">
    <div class="landing-inner">
      <div class="landing-badge"></div>

      <div class="landing-title">Over &amp;<br><span class="highlight">&amp; Out</span></div>
      <div class="landing-desc">Pick a 5-digit frequency.<br>Hold to talk. Release to listen.</div>

      <div class="freq-card">
        <div class="freq-card-label">Select Frequency</div>
        <div class="freq-picker-row">
          <!-- 3-digit drum roller -->
          <div class="drum-roller" id="drum-roller">
            <div class="drum-hl"></div>
            <div class="drum-track" id="drum-track"></div>
          </div>

          <div class="freq-dot-sep">·</div>

          <!-- 2 single-digit rollers -->
          <div class="right-rollers">
            <div class="single-roller" id="roller-a">
              <div class="single-hl"></div>
              <div class="single-track" id="track-a"></div>
            </div>
            <div class="single-roller" id="roller-b">
              <div class="single-hl"></div>
              <div class="single-track" id="track-b"></div>
            </div>
          </div>
        </div>

        <button class="tune-btn" id="tune-btn">▶ &nbsp; Tune In</button>
      </div>

      <div class="landing-hint">scroll · drag · swipe to adjust digits</div>
    </div>
  </div>

  <!-- ── Toast Notification ──────────────────────────────────────────────── -->
  <div id="toast"></div>

  <!-- ── Radio Body ──────────────────────────────────────────────────────── -->
  <div class="radio-wrap">
    <div class="antenna"></div>
    <div class="radio-body">
      <div class="silver-strip"></div>

      <!-- Status knobs -->
      <div class="knobs-row">
        <div class="knob-wrap">
          <div class="knob knob-green" id="knob-green"></div>
          <div class="knob-label">TX</div>
        </div>
        <div class="knob-brand">O&amp;O</div>
        <div class="knob-wrap">
          <div class="knob knob-red" id="knob-red"></div>
          <div class="knob-label">BUSY</div>
        </div>
      </div>

      <!-- LCD Screen -->
      <div class="screen-bezel">
        <div class="screen">
          <div class="screen-top">
            <div class="status-dot" id="status-dot"></div>
            <div class="user-count" id="user-count">— / 8</div>
          </div>
          <div class="screen-freq">
            <div class="sf-left"  id="sf-left">000</div>
            <div class="sf-dot">·</div>
            <div class="sf-right" id="sf-right">00</div>
          </div>
          <div class="screen-status" id="screen-status">STANDBY</div>
        </div>
      </div>

      <!-- Speaker grille -->
      <div class="speaker-grille">
        <div class="grille-row">
          <div class="grille-slot"></div><div class="grille-slot"></div>
          <div class="grille-slot"></div><div class="grille-slot"></div>
        </div>
        <div class="grille-row">
          <div class="grille-slot"></div><div class="grille-slot"></div>
          <div class="grille-slot"></div><div class="grille-slot"></div>
        </div>
        <div class="grille-row">
          <div class="grille-slot"></div><div class="grille-slot"></div>
          <div class="grille-slot"></div><div class="grille-slot"></div>
        </div>
      </div>

      <!-- Push to Talk -->
      <div class="ptt-section">
        <button class="ptt-btn" id="ptt-btn" disabled>Push to Talk</button>
      </div>

      <!-- Decorative keypad -->
      <div class="keypad">
        <div class="key"></div><div class="key"></div><div class="key"></div><div class="key"></div><div class="key"></div>
        <div class="key"></div><div class="key"></div><div class="key"></div><div class="key"></div><div class="key"></div>
        <div class="key"></div><div class="key"></div><div class="key"></div><div class="key"></div><div class="key"></div>
      </div>
    </div>
  </div>

  <!-- ── Credit ───────────────────────────────────────────────────────────── -->
  <div id="credit-box">
    <div class="credit-dot"></div>
    <span>Over &amp; Out · built by <em>Muhit</em></span>
  </div>

  <!-- ── Scripts (ES modules) ─────────────────────────────────────────────── -->
  <script type="module" src="/js/main.js"></script>

</body>
</html>
